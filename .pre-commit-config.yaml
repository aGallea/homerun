exclude: "(target/|node_modules/|dist/|gen/|Cargo\\.lock)"
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: ["--branch", "master"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: no-commit-to-branch
        name: no-push-to-master
        args: ["--branch", "master"]
        stages: [pre-push]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          [
            "feat",
            "fix",
            "chore",
            "ci",
            "docs",
            "style",
            "refactor",
            "perf",
            "test",
            "build",
            "revert",
          ]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, css, json, yaml, markdown]
        additional_dependencies: ["prettier@3"]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args: ["--fix"]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-d", "{extends: relaxed, rules: {line-length: {max: 200}}}"]

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: bash -c 'source "$HOME/.cargo/env" 2>/dev/null; cargo fmt --all -- --check'
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: bash -c 'source "$HOME/.cargo/env" 2>/dev/null; cargo clippy --all-targets --all-features -- -D warnings'
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-test
        name: cargo test
        entry: bash -c 'source "$HOME/.cargo/env" 2>/dev/null; cargo test -p homerund -p homerun --quiet'
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]

      - id: typescript-check
        name: tsc --noEmit
        entry: bash -c 'cd apps/desktop && [ -d node_modules ] && npx tsc --noEmit || true'
        language: system
        always_run: true
        pass_filenames: false
