name: CI

on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  pre-commit:
    name: Pre-commit checks
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install pre-commit
        run: pip3 install pre-commit --quiet 2>/dev/null || pip install pre-commit --quiet

      - name: Install Node dependencies
        run: cd apps/desktop && npm ci

      - name: Run pre-commit
        run: python3 -m pre_commit run --all-files --show-diff-on-failure
        env:
          SKIP: cargo-test,cargo-clippy

  react-test:
    name: React (test + coverage)
    runs-on: self-hosted
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload React coverage
        uses: actions/upload-artifact@v4
        with:
          name: react-lcov
          path: apps/desktop/coverage/lcov.info

  rust:
    name: Rust (fmt + clippy + test + coverage)
    needs: [react-test]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Ensure Rust is available
        run: |
          rustc --version
          cargo --version

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install cargo-llvm-cov
        run: which cargo-llvm-cov || cargo install cargo-llvm-cov --quiet

      - name: Run tests with coverage (daemon)
        run: cargo llvm-cov -p homerund --all-features --lcov --output-path daemon-lcov.info

      - name: Run tests with coverage (tui)
        run: cargo llvm-cov -p homerun --all-features --lcov --output-path tui-lcov.info

      - name: Download React coverage
        uses: actions/download-artifact@v4
        with:
          name: react-lcov
          path: react-coverage/

      - name: Merge coverage
        run: |
          # Prefix React lcov paths with apps/desktop/ so they match repo-root-relative paths
          sed 's|^SF:src/|SF:apps/desktop/src/|' react-coverage/lcov.info > react-lcov-fixed.info
          cat daemon-lcov.info tui-lcov.info react-lcov-fixed.info > lcov.info

      - name: Coverage Report
        if: always()
        continue-on-error: true
        uses: aGallea/tests-coverage-report@1.3.14
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          lcov-path: ./lcov.info
          diffcover-ref: lcov
          show-junit: false
          show-diffcover: true
          min-coverage-percentage: "80"
          fail-under-coverage-percentage: "false"

  typescript:
    name: TypeScript (type check + build)
    runs-on: self-hosted
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
