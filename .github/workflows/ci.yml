name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust (fmt + clippy + test + coverage)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure Rust is available
        run: |
          source "$HOME/.cargo/env" 2>/dev/null || true
          rustc --version
          cargo --version

      - name: Check formatting
        run: |
          source "$HOME/.cargo/env" 2>/dev/null || true
          cargo fmt --all -- --check

      - name: Run clippy
        run: |
          source "$HOME/.cargo/env" 2>/dev/null || true
          cargo clippy --all-targets --all-features -- -D warnings

      - name: Install cargo-llvm-cov
        run: |
          source "$HOME/.cargo/env" 2>/dev/null || true
          which cargo-llvm-cov || cargo install cargo-llvm-cov --quiet

      - name: Run tests with coverage (daemon)
        run: |
          source "$HOME/.cargo/env" 2>/dev/null || true
          cargo llvm-cov -p homerund --all-features --lcov --output-path daemon-lcov.info

      - name: Run tests with coverage (tui)
        run: |
          source "$HOME/.cargo/env" 2>/dev/null || true
          cargo llvm-cov -p homerun --all-features --lcov --output-path tui-lcov.info

      - name: Merge coverage
        run: cat daemon-lcov.info tui-lcov.info > lcov.info

      - name: Coverage Report
        if: always()
        continue-on-error: true
        uses: aGallea/tests-coverage-report@1.3.11
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          lcov-path: ./lcov.info
          diffcover-ref: lcov
          show-junit: false
          show-diffcover: true
          min-coverage-percentage: '80'
          fail-under-coverage-percentage: 'false'

      - name: Extract coverage percentage
        if: always()
        id: coverage
        run: |
          source "$HOME/.cargo/env" 2>/dev/null || true
          COVERAGE=$(cargo llvm-cov -p homerund -p homerun --all-features --summary-only 2>&1 | grep "^TOTAL" | awk '{print $NF}' | sed 's/%//')
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Coverage: $COVERAGE%"

      - name: Update coverage badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        continue-on-error: true
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 77f18f115b500bdc5d6df52f95d399b9
          filename: coverage.json
          label: coverage
          message: "${{ steps.coverage.outputs.percentage }}%"
          valColorRange: ${{ steps.coverage.outputs.percentage }}
          minColorRange: 50
          maxColorRange: 95

  typescript:
    name: TypeScript (type check + build)
    runs-on: self-hosted
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
