name: CI

on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

  # NOTE: CI runs on self-hosted runners. External contributors will need a
  # maintainer to approve and run CI on their PRs.

jobs:
  pre-commit:
    name: Pre-commit checks
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust toolchain and Git to PATH
        run: |
          TOOLCHAIN_BIN="$(dirname "$(rustup which rustc)")"
          echo "$TOOLCHAIN_BIN" >> $GITHUB_PATH
          # Ensure git.exe is in PATH for pre-commit on Windows
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "/c/Program Files/Git/cmd" >> $GITHUB_PATH
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        if: runner.os != 'Windows'
        with:
          python-version: "3.x"

      - name: Setup Python (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          @echo off
          REM setup-python fails on self-hosted Windows runners due to HKLM
          REM registry permissions.  Find Python in the runner's tool cache.
          REM GITHUB_WORKSPACE is <runner>/_work/<repo>/<repo>, tool cache is <runner>/_work/_tool
          for /f "delims=" %%d in ('dir /b /ad "%GITHUB_WORKSPACE%\..\..\_tool\Python"') do set PY_VER=%%d
          if not defined PY_VER (
            echo ::error::No cached Python found in tool cache
            exit /b 1
          )
          set PY_DIR=%GITHUB_WORKSPACE%\..\..\_tool\Python\%PY_VER%\x64
          echo Using Python from %PY_DIR%
          echo %PY_DIR%>> %GITHUB_PATH%
          echo %PY_DIR%\Scripts>> %GITHUB_PATH%

      - name: Install pre-commit
        run: |
          python -m pip install pre-commit --quiet

      - name: Install Node dependencies
        run: cd apps/desktop && npm ci

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure
        env:
          SKIP: cargo-test,cargo-clippy

  react-test:
    name: React (test + coverage)
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload React coverage
        uses: actions/upload-artifact@v4
        with:
          name: react-lcov
          path: apps/desktop/coverage/lcov.info

  rust:
    name: Rust (fmt + clippy + test + coverage)
    needs: [react-test]
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust toolchain to PATH
        run: |
          TOOLCHAIN_BIN="$(dirname "$(rustup which rustc)")"
          echo "$TOOLCHAIN_BIN" >> $GITHUB_PATH

      - name: Ensure Rust is available
        run: |
          rustc --version
          cargo --version

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --quiet 2>/dev/null || true

      - name: Run tests with coverage (daemon)
        run: cargo llvm-cov -p homerund --all-features --lcov --output-path daemon-lcov.info

      - name: Run tests with coverage (tui)
        run: cargo llvm-cov -p homerun --all-features --lcov --output-path tui-lcov.info

      - name: Download React coverage
        uses: actions/download-artifact@v4
        with:
          name: react-lcov
          path: react-coverage/

      - name: Merge coverage
        run: |
          # Prefix React lcov paths with apps/desktop/ so they match repo-root-relative paths
          sed 's|^SF:src/|SF:apps/desktop/src/|' react-coverage/lcov.info > react-lcov-fixed.info
          cat daemon-lcov.info tui-lcov.info react-lcov-fixed.info > lcov.info

      - name: Coverage Report
        if: always()
        continue-on-error: true
        uses: aGallea/tests-coverage-report@1.3.14
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          lcov-path: ./lcov.info
          diffcover-ref: lcov
          show-junit: false
          show-diffcover: true
          min-coverage-percentage: "80"
          fail-under-coverage-percentage: "false"

  typescript:
    name: TypeScript (type check + build)
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
