name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Rust ──────────────────────────────────────────────────────────────────

  rust-fmt:
    name: Rust / fmt
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  rust-clippy:
    name: Rust / clippy
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  rust-test:
    name: Rust / test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --quiet

      - name: Run tests with coverage (daemon)
        run: cargo llvm-cov -p homerund --all-features --lcov --output-path daemon-lcov.info

      - name: Run tests with coverage (tui)
        run: cargo llvm-cov -p homerun --all-features --lcov --output-path tui-lcov.info

      - name: Merge coverage
        run: cat daemon-lcov.info tui-lcov.info > lcov.info

      - name: Coverage Report
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: aGallea/tests-coverage-report@1.3.11
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          lcov-path: ./lcov.info
          diffcover-ref: lcov
          show-junit: false
          show-diffcover: true
          min-coverage-percentage: '80'
          fail-under-coverage-percentage: 'false'

  rust-audit:
    name: Rust / audit
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet

      - name: Audit dependencies
        run: cargo audit

  # ── TypeScript ────────────────────────────────────────────────────────────

  ts-typecheck:
    name: TypeScript / type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  ts-build:
    name: TypeScript / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
