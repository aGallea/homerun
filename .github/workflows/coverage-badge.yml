name: Coverage Badge

on:
  push:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  update-badge:
    name: Update coverage badge
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Node dependencies
        run: cd apps/desktop && npm ci

      - name: Run React tests with coverage
        run: cd apps/desktop && npm run test:coverage

      - name: Add Rust to PATH
        run: |
          source "$HOME/.cargo/env" 2>/dev/null || true
          echo "$(dirname "$(rustup which rustc)")" >> $GITHUB_PATH

      - name: Install cargo-llvm-cov
        run: which cargo-llvm-cov || cargo install cargo-llvm-cov --quiet

      - name: Run tests with coverage
        run: cargo llvm-cov -p homerund -p homerun --all-features --summary-only 2>&1 | tee coverage-summary.txt

      - name: Clean Rust build artifacts
        if: always()
        run: cargo clean

      - name: Update badge
        env:
          GIST_SECRET: ${{ secrets.GIST_SECRET }}
        run: |
          COVERAGE=$(grep "^TOTAL" coverage-summary.txt | grep -oE '[0-9]+\.[0-9]+%' | sed -n '3p' | sed 's/%//')
          echo "Coverage: $COVERAGE%"
          # Map 50-95% to hue 0(red)-120(green)
          HUE=$(awk "BEGIN {h=($COVERAGE-50)/(95-50)*120; if(h<0)h=0; if(h>120)h=120; printf \"%.0f\", h}")
          # Build badge JSON and gist payload (no jq dependency)
          BADGE="{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${COVERAGE}%\",\"color\":\"hsl($HUE, 100%, 40%)\"}"
          PAYLOAD="{\"files\":{\"coverage.json\":{\"content\":$(printf '%s' "$BADGE" | sed 's/\\/\\\\/g; s/"/\\"/g; s/^/"/; s/$/"/')}}}"
          curl -sf -X PATCH \
            -H "Authorization: token $GIST_SECRET" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            https://api.github.com/gists/77f18f115b500bdc5d6df52f95d399b9
