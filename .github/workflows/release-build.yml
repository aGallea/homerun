name: Release Build

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: self-hosted
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build homerund sidecar
        run: |
          cargo build --release -p homerund --target ${{ matrix.target }}
          mkdir -p apps/desktop/src-tauri/binaries
          cp target/${{ matrix.target }}/release/homerund \
            apps/desktop/src-tauri/binaries/homerund-${{ matrix.target }}

      - name: Build homerun CLI
        run: cargo build --release -p homerun --target ${{ matrix.target }}

      - name: Package CLI binaries
        run: |
          mkdir -p cli-dist
          cp target/${{ matrix.target }}/release/homerun cli-dist/
          cp target/${{ matrix.target }}/release/homerund cli-dist/
          tar -czf homerun-${{ github.ref_name }}-${{ matrix.target }}.tar.gz -C cli-dist .

      - name: Upload CLI tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.arch }}
          path: homerun-*.tar.gz
          if-no-files-found: error

      - name: Build Tauri app
        working-directory: apps/desktop
        # Code-signing env vars omitted — unsigned builds for now.
        # Add APPLE_CERTIFICATE etc. when code-signing is set up (see #49).
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: HomeRun-${{ matrix.arch }}
          path: apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.dmg
            artifacts/*.tar.gz
          draft: false

  update-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: self-hosted
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256 hashes and dispatch
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_CLI_ARM=$(shasum -a 256 artifacts/homerun-v${VERSION}-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_CLI_X86=$(shasum -a 256 artifacts/homerun-v${VERSION}-x86_64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_DMG_ARM=$(shasum -a 256 artifacts/HomeRun_${VERSION}_aarch64.dmg | awk '{print $1}')
          SHA_DMG_X86=$(shasum -a 256 artifacts/HomeRun_${VERSION}_x64.dmg | awk '{print $1}')

          gh api repos/aGallea/homebrew-homerun/dispatches \
            --method POST \
            -f event_type=update-tap \
            -f "client_payload[version]=${VERSION}" \
            -f "client_payload[sha256_cli_arm64]=${SHA_CLI_ARM}" \
            -f "client_payload[sha256_cli_x86_64]=${SHA_CLI_X86}" \
            -f "client_payload[sha256_dmg_arm64]=${SHA_DMG_ARM}" \
            -f "client_payload[sha256_dmg_x86_64]=${SHA_DMG_X86}"
